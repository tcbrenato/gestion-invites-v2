<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hôtesses | Gestion Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --gold: #786631; --gold-light: #C9A84C;
      --dark: #0f172a; --dark2: #1e293b; --dark3: #16213e;
      --card: #1e293b; --green: #16a34a; --red: #890c09;
      --text: #F0F0F0; --text2: #94a3b8;
      --sidebar-width: 280px;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; padding-bottom: 80px; display: flex; }

    /* --- SIDEBAR --- */
    .sidebar-left {
      display: none; width: var(--sidebar-width); background: var(--dark2); border-right: 2px solid var(--gold);
      padding: 25px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 150; flex-direction: column;
    }
    @media (min-width: 1024px) {
      .sidebar-left { display: flex; }
      .header, .tabs, .content, .bottom-nav { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)) !important; }
    }

    /* --- HEADER & ELEMENTS --- */
    .header { background: linear-gradient(135deg, var(--dark2), var(--dark3)); padding: 16px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--gold); }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .header h1 { font-size: 18px; font-weight: 700; color: var(--gold); text-transform: uppercase; }
    .hotesse-badge { background: var(--gold); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; }
    
    .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .stat-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; text-align: center; border: 1px solid rgba(120, 102, 49, 0.2); }
    .stat-number { font-size: 22px; font-weight: 800; color: var(--green); }
    .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; }

    .search-box { position: relative; }
    .search-box input { width: 100%; padding: 12px 16px 12px 40px; background: var(--dark); border: 1px solid var(--gold); border-radius: 25px; color: var(--text); outline: none; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gold); }

    .tabs { display: flex; background: var(--dark2); padding: 6px; gap: 4px; position: sticky; top: 165px; z-index: 99; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .tab { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text2); }
    .tab.active { background: var(--gold); color: white; }

    .content { padding: 15px; width: 100%; }

    /* --- TABLES & INVITES --- */
    .table-card { background: var(--card); border-radius: 14px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
    .table-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; cursor: pointer; background: rgba(255,255,255,0.02); }
    .table-number { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; }
    .status-full { background: var(--green); }
    .status-partial { background: var(--gold); }
    .status-empty { background: #475569; }

    .invite-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .check-btn { width: 38px; height: 38px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; cursor: pointer; background: transparent; }
    .check-btn.present { border-color: var(--green); background: var(--green); color: white; }
    .check-btn.absent { border-color: #475569; color: #475569; }

    /* --- MODALS --- */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border-radius: 20px; padding: 25px; width: 100%; max-width: 350px; border: 2px solid var(--gold); text-align: center; }
    .modal input { width: 100%; padding: 12px; background: var(--dark); border: 1px solid var(--gold); border-radius: 10px; color: white; margin-bottom: 10px; text-align: center; }
    .modal-btn { width: 100%; padding: 14px; background: var(--green); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }

    .btn-add-floating { position: fixed; bottom: 85px; right: 20px; width: 60px; height: 60px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 110; cursor: pointer; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark2); border-top: 1px solid var(--gold); display: flex; z-index: 100; height: 70px; }
    .nav-btn { flex: 1; border: none; background: transparent; color: var(--text2); font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
    .nav-btn.active { color: var(--green); }
    
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--green); color: white; padding: 12px 25px; border-radius: 30px; font-weight: 600; z-index: 400; opacity: 0; transition: 0.3s; }
    .toast.show { opacity: 1; }
    
    .invites-list { display: none; padding: 5px 15px; background: rgba(0,0,0,0.2); }
    .invites-list.open { display: block; }
  </style>
</head>
<body>

<div class="sidebar-left">
    <h2 style="margin-bottom: 20px;">📊 Dashboard</h2>
    <div class="stat-card">
        <div class="stat-number" id="sidePresents">0</div>
        <div class="stat-label">Présents</div>
    </div>
    <h4 style="margin-top: 30px; font-size: 0.8rem; color: var(--gold);">DERNIÈRES ENTRÉES</h4>
    <div id="arrivalFlow" style="margin-top:15px; font-size: 0.85rem;"></div>
</div>

<div class="modal-overlay open" id="modalHotesse">
  <div class="modal">
    <h2>👋 Bienvenue</h2>
    <p style="color:var(--text2); margin-bottom:15px;">Ton prénom pour le pointage :</p>
    <input type="text" id="inputHotesse" placeholder="Prénom..." maxlength="30">
    <button class="modal-btn" id="btnCommencer">Accéder au Dashboard ✨</button>
  </div>
</div>

<div class="modal-overlay" id="modalAjout">
  <div class="modal">
    <h2 style="color:var(--green)">➕ Nouvel Invité</h2>
    <p style="color:var(--text2); margin-bottom:15px;">Ajout manuel et pointage direct</p>
    <input type="text" id="addNom" placeholder="Nom Complet">
    <input type="number" id="addTable" placeholder="N° de Table">
    <input type="number" id="addNombre" placeholder="Nombre de personnes" value="1">
    <button class="modal-btn" id="btnEnregistrerInvite">Valider l'Entrée ✅</button>
    <button onclick="document.getElementById('modalAjout').classList.remove('open')" style="background:transparent; border:none; color:var(--text2); margin-top:15px; cursor:pointer;">Annuler</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="btn-add-floating" id="btnOpenAdd">＋</button>

<div class="header">
  <div class="header-top">
    <h1>Gestion Invités</h1>
    <div class="hotesse-badge" id="hotesseName">...</div>
  </div>
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-number" id="statPresents">0</div><div class="stat-label">Présents</div></div>
    <div class="stat-card"><div class="stat-number" id="statAbsents" style="color:var(--gold)">0</div><div class="stat-label">Attendus</div></div>
    <div class="stat-card"><div class="stat-number" id="statTotal" style="color:white">0</div><div class="stat-label">Total</div></div>
  </div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher par nom...">
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-tables">Tables</button>
  <button class="tab" id="tab-invites">Invités</button>
  <button class="tab" id="tab-dashboard">Global</button>
</div>

<div class="content" id="mainContent"></div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-tables">🪑<br>Tables</button>
  <button class="nav-btn" id="nav-invites">👥<br>Invités</button>
  <button class="nav-btn" id="nav-dashboard">📊<br>Global</button>
</div>

<script>
(function() {
  const SUPA_URL = 'https://zcldavwxehfnteiilztg.supabase.co';
  const SUPA_KEY = 'sb_publishable_bOyD0-uMmO7RN3OwFQFFZQ_miIJKqc5';
  const db = window.supabase.createClient(SUPA_URL, SUPA_KEY);

  let hotesse = localStorage.getItem('hotesse') || '';
  let currentTab = 'tables';
  let allTables = [];
  let allInvites = [];
  let openTables = new Set();

  function init() {
    if (hotesse) {
      document.getElementById('modalHotesse').classList.remove('open');
      document.getElementById('hotesseName').textContent = '👤 ' + hotesse;
    }
    loadData();
    subscribeRealtime();

    // Listeners
    document.getElementById('btnCommencer').onclick = setHotesse;
    document.getElementById('hotesseName').onclick = () => document.getElementById('modalHotesse').classList.add('open');
    document.getElementById('searchInput').oninput = (e) => onSearch(e.target.value);
    document.getElementById('btnOpenAdd').onclick = () => document.getElementById('modalAjout').classList.add('open');
    document.getElementById('btnEnregistrerInvite').onclick = addNewInvite;

    // Tabs & Nav
    ['tables', 'invites', 'dashboard'].forEach(t => {
      document.getElementById('tab-'+t).onclick = () => showTab(t);
      document.getElementById('nav-'+t).onclick = () => showTab(t);
    });
  }

  function setHotesse() {
    let val = document.getElementById('inputHotesse').value.trim();
    if (!val) return;
    hotesse = val;
    localStorage.setItem('hotesse', val);
    document.getElementById('hotesseName').textContent = '👤 ' + val;
    document.getElementById('modalHotesse').classList.remove('open');
  }

  async function loadData() {
    const t = await db.from('tables').select('*').order('numero');
    const i = await db.from('invites').select('*, tables(numero, nom)').order('nom');
    allTables = t.data || [];
    allInvites = i.data || [];
    updateStats();
    renderCurrentTab();
  }

  function subscribeRealtime() {
    db.channel('invites-live').on('postgres_changes', { event: '*', schema: 'public', table: 'invites' }, loadData).subscribe();
  }

  function updateStats() {
    const presents = allInvites.filter(i => i.statut === 'present').reduce((s, i) => s + i.nombre_personnes, 0);
    const total = allInvites.reduce((s, i) => s + i.nombre_personnes, 0);
    
    document.getElementById('statPresents').textContent = presents;
    document.getElementById('sidePresents').textContent = presents;
    document.getElementById('statAbsents').textContent = total - presents;
    document.getElementById('statTotal').textContent = total;

    // Update Side Log
    const recent = allInvites.filter(i => i.statut === 'present')
      .sort((a,b) => new Date(b.heure_arrivee) - new Date(a.heure_arrivee)).slice(0, 5);
    
    document.getElementById('arrivalFlow').innerHTML = recent.map(p => {
      const time = new Date(p.heure_arrivee).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
      return `<div style="padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05)"><b>${p.nom}</b> <span style="color:var(--green); float:right">${time}</span></div>`;
    }).join('');
  }

  async function addNewInvite() {
    const nom = document.getElementById('addNom').value.trim();
    const tableId = document.getElementById('addTable').value;
    const nb = document.getElementById('addNombre').value;
    if(!nom || !tableId) return alert("Nom et Table requis");

    const { error } = await db.from('invites').insert([{
      nom: nom, table_id: parseInt(tableId), nombre_personnes: parseInt(nb),
      statut: 'present', heure_arrivee: new Date().toISOString(), checked_by: hotesse
    }]);

    if (!error) {
      showToast("✅ Ajouté et Pointé !");
      document.getElementById('modalAjout').classList.remove('open');
      document.getElementById('addNom').value = '';
    }
  }

  function showTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab, .nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    document.getElementById('nav-'+tab).classList.add('active');
    renderCurrentTab();
  }

  function renderCurrentTab() {
    const content = document.getElementById('mainContent');
    if (currentTab === 'tables') renderTables();
    else if (currentTab === 'invites') renderInvites();
    else renderDashboard();
  }

  function renderTables() {
    const content = document.getElementById('mainContent');
    content.innerHTML = allTables.map(table => {
      const invites = allInvites.filter(i => i.table_id === table.id);
      const pres = invites.filter(i => i.statut === 'present').reduce((s, i) => s + i.nombre_personnes, 0);
      const tot = invites.reduce((s, i) => s + i.nombre_personnes, 0);
      const pct = tot > 0 ? (pres / tot) * 100 : 0;
      const statusClass = pct === 100 ? 'status-full' : pct > 0 ? 'status-partial' : 'status-empty';
      const isOpen = openTables.has(table.id);

      return `<div class="table-card">
        <div class="table-header" onclick="toggleTable(${table.id})">
          <div style="display:flex; align-items:center; gap:12px;">
            <div class="table-number ${statusClass}">${table.numero}</div>
            <div><h3 style="font-size:14px;">${table.nom}</h3><p style="font-size:11px;color:var(--text2)">${pres}/${tot} pers.</p></div>
          </div>
          <div style="text-align:right">
            <span style="font-weight:bold; color:${pct===100?'var(--green)':'var(--gold)'}">${Math.round(pct)}%</span>
            <div style="width:50px; height:4px; background:rgba(255,255,255,0.1); margin-top:4px;"><div style="width:${pct}%; height:100%; background:var(--green)"></div></div>
          </div>
        </div>
        <div class="invites-list ${isOpen?'open':''}">
          ${invites.map(inv => renderInviteRow(inv)).join('')}
        </div>
      </div>`;
    }).join('');
  }

  window.toggleTable = (id) => {
    if (openTables.has(id)) openTables.delete(id); else openTables.add(id);
    renderTables();
  };

  function renderInviteRow(inv) {
    const isP = inv.statut === 'present';
    return `<div class="invite-item">
      <div style="flex:1">
        <div style="font-size:13px; font-weight:600">${inv.nom}</div>
        <div style="font-size:10px; color:${isP?'var(--green)':'var(--text2)'}">${isP?'✅ Arrivé':'En attente'}</div>
      </div>
      ${inv.nombre_personnes > 1 ? `<span style="background:rgba(201,168,76,0.2); color:var(--gold); padding:2px 6px; border-radius:8px; font-size:10px; margin-right:10px;">×${inv.nombre_personnes}</span>` : ''}
      <button class="check-btn ${isP?'present':'absent'}" onclick="toggleInvite(${inv.id}, '${inv.statut}')">${isP?'✓':'○'}</button>
    </div>`;
  }

  async function toggleInvite(id, current) {
    const next = current === 'present' ? 'absent' : 'present';
    const { error } = await db.from('invites').update({
      statut: next, heure_arrivee: next === 'present' ? new Date().toISOString() : null, checked_by: hotesse
    }).eq('id', id);
    if (!error) showToast(next === 'present' ? "✅ Pointé !" : "❌ Annulé");
  }

  function renderInvites() {
    document.getElementById('mainContent').innerHTML = allInvites.map(inv => `
      <div class="table-card" style="padding:12px; display:flex; align-items:center; gap:15px; border-left:4px solid ${inv.statut==='present'?'var(--green)':'#475569'}">
        <button class="check-btn ${inv.statut==='present'?'present':'absent'}" onclick="toggleInvite(${inv.id}, '${inv.statut}')">${inv.statut==='present'?'✓':'○'}</button>
        <div style="flex:1">
          <div style="font-weight:700">${inv.nom} ${inv.nombre_personnes>1?'(×'+inv.nombre_personnes+')':''}</div>
          <div style="font-size:11px; color:var(--gold)">🪑 ${inv.tables?inv.tables.nom:'Table inconnue'}</div>
        </div>
      </div>
    `).join('');
  }

  function renderDashboard() {
    const pres = allInvites.filter(i => i.statut === 'present').reduce((s, i) => s + i.nombre_personnes, 0);
    const tot = allInvites.reduce((s, i) => s + i.nombre_personnes, 0);
    document.getElementById('mainContent').innerHTML = `
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
        <div class="stat-card" style="padding:20px;"><div class="stat-number">${pres}</div><div class="stat-label">Présents</div></div>
        <div class="stat-card" style="padding:20px;"><div class="stat-number" style="color:var(--gold)">${tot-pres}</div><div class="stat-label">Attendus</div></div>
      </div>
      ${allTables.map(t => {
        const inv = allInvites.filter(i => i.table_id === t.id);
        const p = inv.filter(i => i.statut === 'present').reduce((s, i) => s + i.nombre_personnes, 0);
        const total = inv.reduce((s, i) => s + i.nombre_personnes, 0);
        const pct = total > 0 ? (p / total) * 100 : 0;
        return `<div style="display:flex; align-items:center; gap:10px; margin-bottom:8px; background:var(--dark2); padding:10px; border-radius:10px;">
          <div style="width:70px; font-size:11px; font-weight:bold; color:var(--gold)">${t.nom}</div>
          <div style="flex:1; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden;"><div style="width:${pct}%; height:100%; background:${pct===100?'var(--green)':'var(--gold)'}"></div></div>
          <div style="font-size:11px; width:40px; text-align:right">${p}/${total}</div>
        </div>`;
      }).join('')}
    `;
  }

  function onSearch(val) {
    if (!val.trim()) { renderCurrentTab(); return; }
    const q = val.toLowerCase();
    const res = allInvites.filter(i => i.nom.toLowerCase().includes(q));
    document.getElementById('mainContent').innerHTML = res.map(inv => renderInviteRow(inv)).join('');
  }

  function showToast(m) {
    const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  window.toggleInvite = toggleInvite;
  window.addEventListener('load', init);
})();
</script>
</body>
</html>
