<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gestion Invités | Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --gold: #786631; --gold-light: #C9A84C;
      --dark: #0f172a; --dark2: #1e293b; --dark3: #16213e;
      --card: #1e293b; --green: #16a34a; --red: #890c09;
      --text: #F0F0F0; --text2: #94a3b8;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; padding-bottom: 80px; overflow-x: hidden; }

    /* --- SIDEBAR TIROIR --- */
    .sidebar-drawer {
      position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
      background: var(--dark2); border-right: 2px solid var(--gold);
      z-index: 1000; transition: 0.3s ease; padding: 25px;
      box-shadow: 10px 0 20px rgba(0,0,0,0.5);
    }
    .sidebar-drawer.open { left: 0; }
    .overlay-sidebar {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999;
    }
    .overlay-sidebar.open { display: block; }

    /* --- HEADER --- */
    .header { background: linear-gradient(135deg, var(--dark2), var(--dark3)); padding: 16px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--gold); }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .menu-btn { background: none; border: none; color: var(--gold); font-size: 24px; cursor: pointer; }
    .header h1 { font-size: 16px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
    .hotesse-badge { background: var(--gold); color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }

    /* --- STATS & RECHERCHE --- */
    .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .stat-card { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px; text-align: center; border: 1px solid rgba(120, 102, 49, 0.2); }
    .stat-number { font-size: 20px; font-weight: 800; color: var(--green); }
    .stat-label { font-size: 9px; color: var(--text2); text-transform: uppercase; }

    .search-box { position: relative; }
    .search-box input { width: 100%; padding: 12px 16px 12px 40px; background: var(--dark); border: 1px solid rgba(120, 102, 49, 0.4); border-radius: 25px; color: var(--text); outline: none; font-size: 14px; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gold); }

    /* --- TABS --- */
    .tabs { display: flex; background: var(--dark2); padding: 6px; gap: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .tab { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text2); }
    .tab.active { background: var(--gold); color: white; }

    .content { padding: 15px; }

    /* --- CARDS --- */
    .table-card { background: var(--card); border-radius: 14px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
    .table-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; cursor: pointer; }
    .table-number { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; }
    .status-full { background: var(--green); }
    .status-partial { background: var(--gold); }
    .status-empty { background: #475569; }

    .invite-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .check-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
    .check-btn.present { border-color: var(--green); background: var(--green); color: white; }
    .check-btn.absent { border-color: #475569; color: #475569; background: transparent; }

    /* --- BOTTOM NAV --- */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark2); border-top: 1px solid var(--gold); display: flex; z-index: 100; height: 65px; }
    .nav-btn { flex: 1; border: none; background: transparent; color: var(--text2); font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
    .nav-btn.active { color: var(--green); }

    /* --- MODALS --- */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border-radius: 20px; padding: 25px; width: 100%; max-width: 340px; border: 1px solid var(--gold); text-align: center; }
    .modal input { width: 100%; padding: 12px; background: var(--dark); border: 1px solid var(--gold); border-radius: 10px; color: white; margin-bottom: 10px; }
    .modal-btn { width: 100%; padding: 14px; background: var(--green); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }

    .btn-add-floating { position: fixed; bottom: 85px; right: 20px; width: 56px; height: 56px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 110; }

    .invites-list { display: none; padding: 5px 10px; background: rgba(0,0,0,0.15); }
    .invites-list.open { display: block; }
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--green); color: white; padding: 10px 20px; border-radius: 20px; z-index: 3000; opacity: 0; pointer-events: none; transition: 0.3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="overlay-sidebar" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar-drawer" id="sidebar">
    <h2 style="color:var(--gold); margin-bottom:20px;">📊 Stats Globales</h2>
    <div class="stat-card">
        <div class="stat-number" id="sidePresents">0</div>
        <div class="stat-label">Total Présents</div>
    </div>
    <h4 style="margin-top: 30px; font-size: 0.8rem; color: var(--gold); letter-spacing: 1px;">FLUX RÉCENT</h4>
    <div id="arrivalFlow" style="margin-top:15px; font-size: 0.85rem; color: var(--text2);"></div>
    <button onclick="toggleMenu()" style="margin-top:40px; background:none; border:1px solid var(--text2); color:var(--text2); padding:8px; border-radius:5px; width:100%; cursor:pointer;">Fermer le menu</button>
</div>

<div class="header">
  <div class="header-top">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <h1>Gestion Invités</h1>
    <div class="hotesse-badge" id="hotesseName">...</div>
  </div>
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-number" id="statPresents">0</div><div class="stat-label">Présents</div></div>
    <div class="stat-card"><div class="stat-number" id="statAbsents" style="color:var(--gold)">0</div><div class="stat-label">Restants</div></div>
    <div class="stat-card"><div class="stat-number" id="statTotal" style="color:white">0</div><div class="stat-label">Total</div></div>
  </div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher un nom...">
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-tables">Tables</button>
  <button class="tab" id="tab-invites">Liste</button>
  <button class="tab" id="tab-dashboard">Global</button>
</div>

<div class="content" id="mainContent"></div>

<button class="btn-add-floating" onclick="document.getElementById('modalAjout').classList.add('open')">＋</button>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-tables">🪑<br>Tables</button>
  <button class="nav-btn" id="nav-invites">👥<br>Liste</button>
  <button class="nav-btn" id="nav-dashboard">📊<br>Global</button>
</div>

<div class="modal-overlay open" id="modalHotesse">
  <div class="modal">
    <h2>👋 Bienvenue</h2>
    <p style="color:var(--text2); margin: 10px 0 20px;">Ton prénom pour le pointage :</p>
    <input type="text" id="inputHotesse" placeholder="Prénom...">
    <button class="modal-btn" onclick="setHotesse()">Commencer ✨</button>
  </div>
</div>

<div class="modal-overlay" id="modalAjout">
  <div class="modal">
    <h2 style="color:var(--green)">➕ Hors-Liste</h2>
    <input type="text" id="addNom" placeholder="Nom Complet">
    <input type="number" id="addTable" placeholder="N° de Table">
    <input type="number" id="addNombre" placeholder="Nombre de personnes" value="1">
    <button class="modal-btn" onclick="addNewInvite()">Valider l'Entrée</button>
    <button onclick="document.getElementById('modalAjout').classList.remove('open')" style="background:none; border:none; color:var(--text2); margin-top:15px; cursor:pointer;">Annuler</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  const SUPA_URL = 'https://zcldavwxehfnteiilztg.supabase.co';
  const SUPA_KEY = 'sb_publishable_bOyD0-uMmO7RN3OwFQFFZQ_miIJKqc5';
  const db = window.supabase.createClient(SUPA_URL, SUPA_KEY);

  let hotesse = localStorage.getItem('hotesse') || '';
  let currentTab = 'tables';
  let allTables = [];
  let allInvites = [];
  let openTables = new Set();

  function init() {
    if (hotesse) {
      document.getElementById('modalHotesse').classList.remove('open');
      document.getElementById('hotesseName').textContent = '👤 ' + hotesse;
    }
    loadData();
    subscribeRealtime();

    document.getElementById('searchInput').oninput = (e) => onSearch(e.target.value);
    ['tables', 'invites', 'dashboard'].forEach(t => {
      document.getElementById('tab-'+t).onclick = () => showTab(t);
      document.getElementById('nav-'+t).onclick = () => showTab(t);
    });
  }

  window.toggleMenu = () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('open');
  };

  window.setHotesse = () => {
    let val = document.getElementById('inputHotesse').value.trim();
    if (!val) return;
    hotesse = val;
    localStorage.setItem('hotesse', val);
    document.getElementById('hotesseName').textContent = '👤 ' + val;
    document.getElementById('modalHotesse').classList.remove('open');
  };

  async function loadData() {
    const t = await db.from('tables').select('*').order('numero');
    const i = await db.from('invites').select('*, tables(numero, nom)').order('nom');
    allTables = t.data || [];
    allInvites = i.data || [];
    updateStats();
    renderCurrentTab();
  }

  function subscribeRealtime() {
    db.channel('invites-live').on('postgres_changes', { event: '*', schema: 'public', table: 'invites' }, loadData).subscribe();
  }

  function updateStats() {
    const pres = allInvites.filter(i => i.statut === 'present').reduce((s, i) => s + i.nombre_personnes, 0);
    const tot = allInvites.reduce((s, i) => s + i.nombre_personnes, 0);
    document.getElementById('statPresents').textContent = pres;
    document.getElementById('sidePresents').textContent = pres;
    document.getElementById('statAbsents').textContent = tot - pres;
    document.getElementById('statTotal').textContent = tot;

    const recent = allInvites.filter(i => i.statut === 'present')
      .sort((a,b) => new Date(b.heure_arrivee) - new Date(a.heure_arrivee)).slice(0, 5);
    document.getElementById('arrivalFlow').innerHTML = recent.map(p => `
      <div style="padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05)"><b>${p.nom}</b> <span style="color:var(--green); float:right">${new Date(p.heure_arrivee).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span></div>
    `).join('');
  }

  window.addNewInvite = async () => {
    const nom = document.getElementById('addNom').value.trim();
    const tid = document.getElementById('addTable').value;
    const nb = document.getElementById('addNombre').value;
    if(!nom || !tid) return;
    const { error } = await db.from('invites').insert([{
      nom: nom, table_id: parseInt(tid), nombre_personnes: parseInt(nb),
      statut: 'present', heure_arrivee: new Date().toISOString(), checked_by: hotesse
    }]);
    if(!error) {
        showToast("✅ Ajouté !");
        document.getElementById('modalAjout').classList.remove('open');
        document.getElementById('addNom').value = '';
    }
  };

  function showTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab, .nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    document.getElementById('nav-'+tab).classList.add('active');
    renderCurrentTab();
  }

  function renderCurrentTab() {
    const content = document.getElementById('mainContent');
    if (currentTab === 'tables') renderTables();
    else if (currentTab === 'invites') renderInvites();
    else renderDashboard();
  }

  function renderTables() {
    document.getElementById('mainContent').innerHTML = allTables.map(table => {
      const invites = allInvites.filter(i => i.table_id === table.id);
      const p = invites.filter(i => i.statut === 'present').reduce((s, i) => s + i.nombre_personnes, 0);
      const t = invites.reduce((s, i) => s + i.nombre_personnes, 0);
      const pct = t > 0 ? (p / t) * 100 : 0;
      const isOpen = openTables.has(table.id);
      return `<div class="table-card">
        <div class="table-header" onclick="toggleTable(${table.id})">
          <div style="display:flex; align-items:center; gap:12px;">
            <div class="table-number ${pct===100?'status-full':pct>0?'status-partial':'status-empty'}">${table.numero}</div>
            <div><h3 style="font-size:14px;">${table.nom}</h3><p style="font-size:11px;color:var(--text2)">${p}/${t} pers.</p></div>
          </div>
          <span style="font-size:12px; color:var(--text2)">${isOpen?'▲':'▼'}</span>
        </div>
        <div class="invites-list ${isOpen?'open':''}">
          ${invites.map(inv => `
            <div class="invite-item">
              <div style="flex:1"><div style="font-size:13px; font-weight:600">${inv.nom}</div><div style="font-size:10px; color:${inv.statut==='present'?'var(--green)':'var(--text2)'}">${inv.statut==='present'?'✅ Arrivé':'En attente'}</div></div>
              <button class="check-btn ${inv.statut==='present'?'present':'absent'}" onclick="toggleInvite(${inv.id}, '${inv.statut}')">${inv.statut==='present'?'✓':'○'}</button>
            </div>`).join('')}
        </div>
      </div>`;
    }).join('');
  }

  window.toggleTable = (id) => {
    if (openTables.has(id)) openTables.delete(id); else openTables.add(id);
    renderTables();
  };

  window.toggleInvite = async (id, cur) => {
    const next = cur === 'present' ? 'absent' : 'present';
    await db.from('invites').update({ statut: next, heure_arrivee: next==='present'?new Date().toISOString():null, checked_by: hotesse }).eq('id', id);
    showToast(next==='present'?"✅ Pointé":"❌ Annulé");
  };

  function renderInvites() {
    document.getElementById('mainContent').innerHTML = allInvites.map(inv => `
      <div class="table-card" style="padding:12px; display:flex; align-items:center; gap:12px;">
        <button class="check-btn ${inv.statut==='present'?'present':'absent'}" onclick="toggleInvite(${inv.id}, '${inv.statut}')">${inv.statut==='present'?'✓':'○'}</button>
        <div style="flex:1"><div style="font-weight:600; font-size:14px;">${inv.nom}</div><div style="font-size:11px; color:var(--gold)">Table ${inv.tables?inv.tables.numero:'?'}</div></div>
      </div>`).join('');
  }

  function renderDashboard() {
    const pres = allInvites.filter(i => i.statut === 'present').reduce((s, i) => s + i.nombre_personnes, 0);
    const tot = allInvites.reduce((s, i) => s + i.nombre_personnes, 0);
    document.getElementById('mainContent').innerHTML = `
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
        <div class="stat-card" style="padding:20px;"><div class="stat-number">${pres}</div><div class="stat-label">Présents</div></div>
        <div class="stat-card" style="padding:20px;"><div class="stat-number" style="color:var(--gold)">${tot-pres}</div><div class="stat-label">Restants</div></div>
      </div>
      ${allTables.map(t => {
        const inv = allInvites.filter(i => i.table_id === t.id);
        const p = inv.filter(i => i.statut === 'present').reduce((s, i) => s + i.nombre_personnes, 0);
        const total = inv.reduce((s, i) => s + i.nombre_personnes, 0);
        const pct = total > 0 ? (p / total) * 100 : 0;
        return `<div style="display:flex; align-items:center; gap:10px; margin-bottom:8px; background:var(--dark2); padding:10px; border-radius:10px;">
          <div style="width:70px; font-size:11px; color:var(--gold)">${t.nom}</div>
          <div style="flex:1; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden;"><div style="width:${pct}%; height:100%; background:${pct===100?'var(--green)':'var(--gold)'}"></div></div>
          <div style="font-size:11px; width:40px; text-align:right">${p}/${total}</div>
        </div>`;
      }).join('')}`;
  }

  // --- RECHERCHE ROBUSTE ---
  function onSearch(val) {
    const content = document.getElementById('mainContent');
    if (!val.trim()) { renderCurrentTab(); return; }
    const query = val.toLowerCase();
    
    const res = allInvites.filter(inv => {
      const nomInvite = inv.nom ? inv.nom.toLowerCase() : "";
      return nomInvite.includes(query);
    });

    if (res.length === 0) {
      content.innerHTML = `<div style="text-align:center; padding:30px; color:var(--text2);">🔍 Aucun résultat pour "${val}"</div>`;
    } else {
      content.innerHTML = res.map(inv => `
        <div class="table-card" style="padding:12px; display:flex; align-items:center; gap:12px; border-left:4px solid ${inv.statut==='present'?'var(--green)':'#475569'}">
          <button class="check-btn ${inv.statut==='present'?'present':'absent'}" onclick="toggleInvite(${inv.id}, '${inv.statut}')">${inv.statut==='present'?'✓':'○'}</button>
          <div style="flex:1">
            <div style="font-weight:600; font-size:14px;">${inv.nom}</div>
            <div style="font-size:11px; color:var(--gold)">🪑 Table ${inv.tables ? (inv.tables.numero || inv.tables.nom) : '?'}</div>
          </div>
        </div>`).join('');
    }
  }

  function showToast(m) {
    const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  window.addEventListener('load', init);
})();
</script>
</body>
</html>
